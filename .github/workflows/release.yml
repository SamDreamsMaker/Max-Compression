name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libomp-dev

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist/mcx-linux-x64
          cp build/bin/mcx dist/mcx-linux-x64/
          cp build/lib/libmaxcomp.so dist/mcx-linux-x64/ 2>/dev/null || true
          cp build/lib/libmaxcomp.a dist/mcx-linux-x64/ 2>/dev/null || true
          cp include/maxcomp/maxcomp.h dist/mcx-linux-x64/
          cp LICENSE README.md dist/mcx-linux-x64/
          cp completions/mcx.bash completions/mcx.zsh completions/mcx.fish dist/mcx-linux-x64/
          cd dist && tar czf mcx-linux-x64.tar.gz mcx-linux-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcx-linux-x64
          path: dist/mcx-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p dist/mcx-macos-arm64
          cp build/bin/mcx dist/mcx-macos-arm64/
          cp build/lib/libmaxcomp.dylib dist/mcx-macos-arm64/ 2>/dev/null || true
          cp build/lib/libmaxcomp.a dist/mcx-macos-arm64/ 2>/dev/null || true
          cp include/maxcomp/maxcomp.h dist/mcx-macos-arm64/
          cp LICENSE README.md dist/mcx-macos-arm64/
          cp completions/mcx.bash completions/mcx.zsh completions/mcx.fish dist/mcx-macos-arm64/
          cd dist && tar czf mcx-macos-arm64.tar.gz mcx-macos-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcx-macos-arm64
          path: dist/mcx-macos-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/mcx-windows-x64
          cp build/bin/Release/mcx.exe dist/mcx-windows-x64/ 2>/dev/null || cp build/bin/mcx.exe dist/mcx-windows-x64/ 2>/dev/null || true
          cp build/lib/Release/maxcomp.lib dist/mcx-windows-x64/ 2>/dev/null || true
          cp build/lib/Release/maxcomp.dll dist/mcx-windows-x64/ 2>/dev/null || true
          cp include/maxcomp/maxcomp.h dist/mcx-windows-x64/
          cp LICENSE README.md dist/mcx-windows-x64/
          cd dist && 7z a mcx-windows-x64.zip mcx-windows-x64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcx-windows-x64
          path: dist/mcx-windows-x64.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mcx-linux-x64/mcx-linux-x64.tar.gz
            artifacts/mcx-macos-arm64/mcx-macos-arm64.tar.gz
            artifacts/mcx-windows-x64/mcx-windows-x64.zip
          body: |
            ## MaxCompression ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x64 | `mcx-linux-x64.tar.gz` |
            | macOS ARM64 | `mcx-macos-arm64.tar.gz` |
            | Windows x64 | `mcx-windows-x64.zip` |

            ### Quick Start
            ```bash
            # Linux/macOS
            tar xzf mcx-*.tar.gz
            ./mcx-*/mcx compress myfile.txt

            # Build from source
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build -j$(nproc)
            ```

            See [CHANGELOG.md](CHANGELOG.md) for full details.
